name: Build and deploy Python app to Azure Web App - SFC-ParkguideBackend

on:
  push:
    branches:
      - CloudServiceInt
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Create virtual environment
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Django project
        run: |
          source antenv/bin/activate

          if grep -R -n -E '^(<<<<<<<|=======|>>>>>>>)' \
            --exclude-dir=.git \
            --exclude-dir=antenv \
            --exclude-dir=venv \
            .; then
              echo "Unresolved merge conflict markers found."
              exit 1
          fi

          python manage.py check

      - name: Vendor dependencies into deployment package
        run: |
          source antenv/bin/activate

          mkdir -p python_packages/lib/site-packages

          pip install \
            --upgrade \
            -r requirements.txt \
            --target="python_packages/lib/site-packages"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !venv/
            !.venv/
            !.git/
            !.github/
            !__pycache__/
            !**/__pycache__/
            !**/*.pyc
            !db.sqlite3
            !media/
            !tests/
            !.pytest_cache/
            !node_modules/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SFC-ParkguideBackend'
          slot-name: 'Production'
          package: .
          clean: true
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_91CADE5BE94248159CB6B522E0E0048B }}